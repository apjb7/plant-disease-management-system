<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treatment Logbook — Plant Disease Management System</title>
  <meta name="description" content="Review your saved plant health diagnostic reports, treatment history, and research-backed evidence references." />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <img src="/icon-192.png" alt="PDMS Logo" class="logo-img" />
        <span class="logo-text">Plant Disease Management System</span>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/history" class="nav-link active">Logbook</a>
        <a href="/admin" class="nav-link">Admin</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <!-- Page header -->
    <section class="card">
      <h2>Treatment Logbook</h2>
      <p class="subtitle">Your saved plant health reports and evidence references</p>

      <!-- Search & filter bar -->
      <div class="logbook-toolbar">
        <div class="search-wrap">
          <input type="text" id="logbookSearch" placeholder="Search reports..." class="search-input" />
        </div>
        <span class="entry-count" id="entryCount"></span>
      </div>
    </section>

    <!-- History entries -->
    <div id="historyContainer"></div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Plant Disease Management System</p>
  </footer>

  <script src="/history.js"></script>
</body>

</html>
